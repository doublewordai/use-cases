[project]
name = "embeddings"
setup = "uv sync"
workflow = [
    "dw project setup",
    "dw project run prepare -- -n 1000",
    "dw files stats batches/batch.jsonl",
    "dw files prepare batches/batch.jsonl --model Qwen/Qwen3-Embedding-8B",
    "dw stream batches/batch.jsonl > results.jsonl",
    "dw project run build-index -- -r results.jsonl",
    "dw project run search -- -q \"how do black holes form\"",
]

[steps.prepare]
description = "Download Wikipedia abstracts and generate embedding batch JSONL"
run = "uv run embeddings prepare"

[steps.build-index]
description = "Build search index from embedding results"
run = "uv run embeddings build-index"

[steps.search]
description = "Search the embedded corpus"
run = "uv run embeddings search"
