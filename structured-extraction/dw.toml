[project]
name = "structured-extraction"
setup = "uv sync"
workflow = [
    "dw project setup",
    "dw project run fetch-data",
    "dw project run prepare -- -i data/sroie/receipts.jsonl -m Qwen/Qwen3-VL-30B-A3B-Instruct-FP8 -n 1 -o batches",
    "dw files stats batches/batch_30b_n1.jsonl",
    "dw files split batches/batch_30b_n1.jsonl --chunk-size 100 -o batches/split",
    "dw batches run batches/split/ --watch --output-id .batch-id",
    "dw batches results --from-file .batch-id -o results/results.jsonl",
    "dw project run analyze -- -i data/sroie/receipts.jsonl -r results/results.jsonl",
    "dw batches analytics --from-file .batch-id",
]

[steps.fetch-data]
description = "Download the SROIE receipt dataset"
run = "uv run python -m src.sroie"

[steps.prepare]
description = "Load receipts and generate extraction batch JSONL"
run = "uv run structured-extraction run --dry-run"

[steps.analyze]
description = "Analyze extraction accuracy with ensemble voting"
run = "uv run structured-extraction analyze"
